<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Widget host — local test</title>
  <style>
    body {
      font-family: -apple-system, system-ui, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      color: #0f172a;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    header h1 {
      margin: 0;
      font-size: 1rem;
    }

    .help-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid #0d9488;
      background: #0d9488;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    main {
      margin-top: 2rem;
      padding: 2rem;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
    }

    code {
      background: #f1f5f9;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .muted {
      color: #64748b;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>myaccount.discovered.ai</h1>
      <button class="help-btn" onclick="window.CSAgent?.toggle()">? Help</button>
    </header>
    <main>
      <h2>This page simulates myaccount.discovered.ai</h2>
      <p class="muted">Click the <strong>Help</strong> button in the header — it calls
        <code>window.CSAgent.toggle()</code> and the widget iframe should slide in.
      </p>
      <p class="muted">Origin: <code id="origin"></code></p>
    </main>
  </div>

  <!-- Paste the snippet from the Widget Installations admin panel. -->
  <script src="http://localhost:3000/widget.js" data-key="cs_bwZrc5sPYZ-fR4W3nMhqymNl" defer></script>
  <script>document.getElementById("origin").textContent = window.location.origin;</script>
</body>

</html>
